<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
      <!-- tailwind and desyui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="min-h-screen max-w-md shadow-2xl bg-base-100  mx-auto">
    <header class="text-center py-4 space-y-3">
            <div class="img">
                <img class="mx-auto" src="./assets/github-logo.png" alt="github-logo">
            </div>
            <div class="imgText">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sing in to manage your issues</p>
            </div>
    </header>

    <main>
        <div class="hero bg-base-200">
    <div class="card bg-base-100 w-full max-w-sm">
      <div class="card-body">
        <fieldset class="fieldset">
          <div>
          <label class="label font-bold text-neutral-800">Username</label>
          <input type="email" id="userNameInput" class="input w-full mb-[2px]" placeholder="Enter Username" />
          <span class="text-primary">Default: admin</span>
          </div>
          
         <div>
          <label class="label font-bold text-neutral-800">Password</label>
          <input type="password" id="passwordInput" class="input w-full mb-[2px]" placeholder="Enter Password" />
          <span class="text-primary">Default: admin123</span>
         </div>
          <button id="signBtn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </div>
  </div>
</div>
</main>
<script src="script.js"></script>
</body>
</html>
