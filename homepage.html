<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
      <!-- tailwind and desyui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    
    <!-- font awsome cdn -->
     <script src="https://kit.fontawesome.com/4f7aa5bbf1.js" crossorigin="anonymous"></script>

</head>
<body>
    <header class="border-b-1 border-blue-500">
       <div class="w-11/12 mx-auto py-4 flex justify-between items-center flex-col gap-3 md:flex-row">
        <div class="image-text flex items-center">
            <img src="./assets/github-logo.png" class="h-10 w-10 " alt="">
            <h3>GitHub Issues Tracker</h3>
        </div>
        <div class="flex items-center gap-2 max-sm:flex-col max-sm:justify-between">
            <input type="text" class="input w-md max-sm:w-[95%] max-sm:mx-auto" id="searchInput" placeholder="🔍Search issues..">
            <button id="searchBtn" class="btn btn-primary">+ New Issue</button>
        </div>

       </div>
    </header>

     <main class="w-10/12 mx-auto mt-5">
        <!-- all open closed button section -->
         <section class="button-section p-5 shadow-md flex gap-3 flex-col md:flex-row">
            <button onclick="selectButton('all')" id="all" class="max-sm:w-full changeButton btn btn-primary w-[120px]">All</button>
            <button onclick="selectButton('open')" id="open" class="max-sm:w-full changeButton btn w-[120px] text-gray-600">Open</button>
            <button onclick="selectButton('closed')" id="closed" class="max-sm:w-full changeButton btn w-[120px] text-gray-600">Closed</button>
         </section>
       
         <!-- all issues open and close  -->
         <section class="mt-6 flex flex-col gap-4  justify-between p-5 shadow-sm items-center md:flex-row">
              <div class="flex items-center gap-2">
                <div class="flex justify-center items-center h-[40px] w-[40px] rounded-full bg-[#ECE4FF]">
                   <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="issue-text">
                    <h2 class="font-bold"><span id="number-of-issue">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
              </div>
              <div class="open-close flex gap-4">
                <div class="open flex items-center gap-1">
                   <p class="h-[10px] w-[10px] bg-green-500 rounded-full"></p>
                   <p class="">Open</p>
                </div>
                <div class="close flex items-center gap-1">
                    <p class="h-[10px] w-[10px] bg-purple-500 rounded-full"></p>
                    <p>Closed</p>
                </div>
              </div>
         </section>
    </main>

</body>
</html>
