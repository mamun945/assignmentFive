<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
      <!-- tailwind and desyui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    
    <!-- font awsome cdn -->
     <script src="https://kit.fontawesome.com/4f7aa5bbf1.js" crossorigin="anonymous"></script>

</head>
<body>
    <header class="border-b-1 border-blue-500">
       <div class="w-11/12 mx-auto py-4 flex justify-between items-center flex-col gap-3 md:flex-row">
        <div class="image-text flex items-center">
            <img src="./assets/github-logo.png" class="h-10 w-10 " alt="">
            <h3>GitHub Issues Tracker</h3>
        </div>
        <div class="flex items-center gap-2 max-sm:flex-col max-sm:justify-between">
            <input type="text" class="input w-md max-sm:w-[95%] max-sm:mx-auto" id="searchInput" placeholder="🔍Search issues..">
            <button id="searchBtn" class="btn btn-primary">+ New Issue</button>
        </div>

       </div>
    </header>
</body>
</html>
